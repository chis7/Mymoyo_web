<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MyThanzi</title>
    <link href="{% static 'vendor/fonts/inter/inter.css' %}" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            background: #eceff1;
            color: #102027;
            font-family: 'Inter', sans-serif;
        }
        .auth-card {
            width: min(100%, 440px);
            padding: 2rem;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 24px 48px rgba(16, 32, 48, 0.12);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            margin-bottom: 2rem;
        }
        .brand-icon {
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            border-radius: 18px;
            background: #ffca28;
            font-size: 1.5rem;
            font-weight: 700;
        }
        h1 { margin: 0; font-size: 1.65rem; }
        .subtitle {
            margin: 0.4rem 0 1.75rem;
            color: #607d8b;
            font-size: 0.95rem;
        }
        label {
            display: block;
            margin: 1rem 0 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #cfd8dc;
            border-radius: 8px;
            font: inherit;
        }
        input:focus {
            outline: none;
            border-color: #00897b;
            box-shadow: 0 0 0 3px rgba(0, 137, 123, 0.1);
        }
        button {
            width: 100%;
            margin-top: 1.5rem;
            padding: 0.85rem;
            border: 0;
            border-radius: 8px;
            background: #00897b;
            color: #ffffff;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
        }
        button:hover { background: #00695c; }
        .auth-link {
            margin: 1.25rem 0 0;
            color: #607d8b;
            font-size: 0.9rem;
            text-align: center;
        }
        .auth-link a {
            color: #00897b;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="auth-card">
        <div class="brand">
            <div class="brand-icon">+</div>
            <div>
                <strong>MyThanzi</strong>
                <div style="color:#607d8b; font-size:0.8rem;">PORTAL</div>
            </div>
        </div>
        <h1>Reset password</h1>
        <p class="subtitle">Enter your account email and we will send a reset link.</p>
        <form method="post">
            {% csrf_token %}
            <label for="{{ form.email.id_for_label }}">Email address</label>
            {{ form.email }}
            <button type="submit">Send Reset Link</button>
        </form>
        <p class="auth-link"><a href="{% url 'login' %}">Back to sign in</a></p>
    </main>
</body>
</html>
