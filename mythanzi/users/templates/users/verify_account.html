{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account - MyThanzi</title>
    <link rel="stylesheet" href="{% static 'vendor/fonts/inter/inter.css' %}">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #f4f7fb;
            color: #172033;
            font-family: Inter, system-ui, sans-serif;
            padding: 1rem;
        }
        .auth-card {
            width: min(100%, 420px);
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
        }
        h1 {
            margin: 0 0 0.5rem;
            font-size: 1.7rem;
        }
        p {
            margin: 0 0 1.2rem;
            color: #5d6b82;
            line-height: 1.55;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccd4df;
            border-radius: 8px;
            padding: 0.9rem 1rem;
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            text-align: center;
        }
        button {
            width: 100%;
            border: 0;
            border-radius: 8px;
            margin-top: 1rem;
            padding: 0.9rem 1rem;
            background: #0f766e;
            color: #fff;
            font-weight: 800;
            cursor: pointer;
        }
        .secondary {
            background: transparent;
            color: #0f766e;
            border: 1px solid #99d4ce;
        }
        .messages {
            margin: 0 0 1rem;
            padding: 0;
            list-style: none;
        }
        .messages li {
            border-radius: 8px;
            padding: 0.75rem 0.85rem;
            margin-bottom: 0.5rem;
            background: #ecfdf5;
            color: #065f46;
            font-size: 0.9rem;
        }
        .messages .error {
            background: #fef2f2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <main class="auth-card">
        <h1>Verify Account</h1>
        <p>Enter the OTP sent to {{ phone }} to activate your MyThanzi account.</p>

        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="otp">OTP code</label>
            <input id="otp" name="otp" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" required>
            <button type="submit">Verify Account</button>
        </form>
        <form method="post">
            {% csrf_token %}
            <button class="secondary" type="submit" name="resend" value="1">Resend OTP</button>
        </form>
    </main>
</body>
</html>
