<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Updated - MyThanzi</title>
    <link href="{% static 'vendor/fonts/inter/inter.css' %}" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            background: #eceff1;
            color: #102027;
            font-family: 'Inter', sans-serif;
        }
        .auth-card {
            width: min(100%, 420px);
            padding: 2rem;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 24px 48px rgba(16, 32, 48, 0.12);
        }
        h1 { margin: 0; font-size: 1.65rem; }
        p { color: #607d8b; line-height: 1.6; }
        a {
            color: #00897b;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="auth-card">
        <h1>Password updated</h1>
        <p>Your password has been changed successfully.</p>
        <p><a href="{% url 'login' %}">Sign in</a></p>
    </main>
</body>
</html>
