services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "55462:5432"
    volumes:
      - mythanzi-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mythanzi-network

  db-backup:
    image: postgres:15-alpine
    command: ["sh", "/usr/local/bin/postgres-backup.sh"]
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      BACKUP_PREFIX: mythanzi
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-30}
    volumes:
      - ./docker/postgres-backup/backup.sh:/usr/local/bin/postgres-backup.sh:ro
      - mythanzi-db-backups:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mythanzi-network

  web:
    build: .
    command: [
      "sh", "-c", 
      "python manage.py migrate --noinput && python manage.py seed_initial_data && python manage.py collectstatic --noinput && gunicorn --bind 0.0.0.0:8000 mythanzi.wsgi"
    ]
    # Removed external ports here. Gunicorn is now protected behind Nginx.
    env_file:
      - .env 
    environment:
      HAPI_FHIR_BASE_URL: http://hapi-fhir:8080/fhir
      HAPI_FHIR_SYNC_ENABLED: "true"
      INITIAL_FACILITIES_FILE: ${INITIAL_FACILITIES_FILE:-}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin123!}
      SEED_ADMIN_FIRST_NAME: ${SEED_ADMIN_FIRST_NAME:-System}
      SEED_ADMIN_LAST_NAME: ${SEED_ADMIN_LAST_NAME:-Administrator}
      SEED_ADMIN_RESET_PASSWORD: ${SEED_ADMIN_RESET_PASSWORD:-false}
    depends_on:
      - db
      - osrm-zambia
      - hapi-fhir
    volumes:
      - static_volume:/app/staticfiles
    networks:
      - mythanzi-network

  hapi-sync:
    profiles:
      - sync
    build: .
    command: [
      "sh", "-c",
      "python manage.py migrate --noinput && python manage.py hapi_sync_worker --interval ${HAPI_SYNC_INTERVAL_SECONDS:-900}"
    ]
    env_file:
      - .env
    environment:
      HAPI_FHIR_BASE_URL: http://hapi-fhir:8080/fhir
      HAPI_FHIR_SYNC_ENABLED: "true"
    depends_on:
      - db
      - hapi-fhir
    restart: unless-stopped
    networks:
      - mythanzi-network

  hapi-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hapi
      POSTGRES_USER: hapi
      POSTGRES_PASSWORD: ${HAPI_POSTGRES_PASSWORD:?Set HAPI_POSTGRES_PASSWORD in .env}
    volumes:
      - hapi-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hapi -d hapi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mythanzi-network

  hapi-fhir:
    image: hapiproject/hapi:latest
    environment:
      HAPI_POSTGRES_PASSWORD: ${HAPI_POSTGRES_PASSWORD:?Set HAPI_POSTGRES_PASSWORD in .env}
    ports:
      - "7201:8080"
    volumes:
      - ./hapi/application.yaml:/app/config/application.yaml:ro
    depends_on:
      hapi-db:
        condition: service_healthy
    networks:
      - mythanzi-network

  hapi-db-backup:
    image: postgres:16-alpine
    command: ["sh", "/usr/local/bin/postgres-backup.sh"]
    environment:
      POSTGRES_HOST: hapi-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: hapi
      POSTGRES_USER: hapi
      POSTGRES_PASSWORD: ${HAPI_POSTGRES_PASSWORD:?Set HAPI_POSTGRES_PASSWORD in .env}
      BACKUP_PREFIX: hapi
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-30}
    volumes:
      - ./docker/postgres-backup/backup.sh:/usr/local/bin/postgres-backup.sh:ro
      - hapi-db-backups:/backups
    depends_on:
      hapi-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mythanzi-network

  osrm-download:
    image: curlimages/curl:8.11.1
    entrypoint: ["/bin/sh", "/usr/local/bin/download-osrm"]
    environment:
      OSRM_PBF_URL: ${OSRM_PBF_URL:-https://download.geofabrik.de/africa/zambia-latest.osm.pbf}
      OSRM_BASE_NAME: ${OSRM_BASE_NAME:-zambia-latest}
      OSRM_MIN_PBF_BYTES: ${OSRM_MIN_PBF_BYTES:-200000000}
    volumes:
      - ./osrm-data:/data
      - ./docker/osrm/download-osrm.sh:/usr/local/bin/download-osrm:ro
    networks:
      - mythanzi-network

  osrm-prepare:
    image: osrm/osrm-backend:latest
    entrypoint: ["/bin/sh", "/usr/local/bin/prepare-osrm"]
    environment:
      OSRM_BASE_NAME: ${OSRM_BASE_NAME:-zambia-latest}
      OSRM_PROFILE: ${OSRM_PROFILE:-/opt/car.lua}
    volumes:
      - ./osrm-data:/data
      - ./docker/osrm/prepare-osrm.sh:/usr/local/bin/prepare-osrm:ro
    depends_on:
      osrm-download:
        condition: service_completed_successfully
    networks:
      - mythanzi-network

  osrm-zambia:
    image: osrm/osrm-backend:latest
    command: ["osrm-routed", "--algorithm", "mld", "/data/${OSRM_BASE_NAME:-zambia-latest}.osrm"]
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    depends_on:
      osrm-prepare:
        condition: service_completed_successfully
    networks:
      - mythanzi-network

  nginx:
    image: nginx:alpine
    ports:
      - "7000:443"  # Maps your local machine's port 7000 to HTTPS port 443
      - "80:80"    # Handles HTTP traffic to redirect it
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web
    networks:
      - mythanzi-network

networks:
  mythanzi-network:
    driver: bridge

volumes:
  mythanzi-db-data:
  mythanzi-db-backups:
  hapi-db-data:
  hapi-db-backups:
  static_volume:
