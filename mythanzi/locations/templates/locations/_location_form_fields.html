<form method="post" action="{{ action_url }}" class="form-stack">
    {% csrf_token %}
    {% for field in form %}
        <div>
            {{ field.label_tag }}
            {{ field }}
            {% if field.help_text %}<small class="form-text">{{ field.help_text }}</small>{% endif %}
            {{ field.errors }}
        </div>
    {% endfor %}
    <button class="btn-primary" type="submit">{{ submit_label|default:"Save" }}</button>
</form>
