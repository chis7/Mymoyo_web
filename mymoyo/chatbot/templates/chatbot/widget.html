<style>
    .chatbot-launcher {
        position: fixed;
        right: 1.5rem;
        bottom: 1.5rem;
        z-index: 1400;
        display: grid;
        place-items: center;
        width: 56px;
        height: 56px;
        border: 0;
        border-radius: 50%;
        background: var(--theme-nav);
        color: #ffffff;
        box-shadow: 0 12px 28px rgba(16, 32, 48, 0.24);
        cursor: pointer;
        touch-action: none;
        user-select: none;
    }
    .chatbot-launcher.dragging {
        cursor: grabbing;
    }
    .chatbot-panel {
        display: none;
        position: fixed;
        right: 1.5rem;
        bottom: 5.75rem;
        z-index: 1400;
        width: min(380px, calc(100vw - 2rem));
        overflow: hidden;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 18px 44px rgba(16, 32, 48, 0.2);
    }
    .chatbot-panel.open {
        display: block;
    }
    .chatbot-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem;
        background: var(--theme-nav);
        color: #ffffff;
    }
    .chatbot-header button {
        border: 0;
        background: transparent;
        color: #ffffff;
        cursor: pointer;
    }
    .chatbot-messages {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        height: 320px;
        padding: 1rem;
        overflow-y: auto;
        background: #f8fafc;
    }
    .chatbot-message {
        max-width: 85%;
        padding: 0.7rem 0.85rem;
        border-radius: 12px;
        font-size: 0.88rem;
        line-height: 1.45;
        white-space: pre-wrap;
    }
    .chatbot-message.assistant {
        align-self: flex-start;
        background: #ffffff;
        color: #334155;
    }
    .chatbot-message.user {
        align-self: flex-end;
        background: var(--theme-nav);
        color: #ffffff;
    }
    .chatbot-message-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        margin-top: 0.65rem;
    }
    .chatbot-message-link {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.35rem 0.55rem;
        border-radius: 999px;
        background: color-mix(in srgb, var(--theme-primary) 14%, #ffffff);
        color: var(--theme-primary);
        font-size: 0.78rem;
        font-weight: 700;
        text-decoration: none;
    }
    .chatbot-message-link:hover {
        color: var(--theme-primary);
        background: color-mix(in srgb, var(--theme-primary) 22%, #ffffff);
    }
    .chatbot-message-link .material-symbols-outlined {
        font-size: 1rem;
    }
    .chatbot-form {
        display: flex;
        gap: 0.5rem;
        padding: 0.8rem;
        border-top: 1px solid #e2e8f0;
    }
    .chatbot-form input {
        min-width: 0;
        flex: 1;
        padding: 0.65rem 0.75rem;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        font: inherit;
    }
    .chatbot-form button {
        display: grid;
        place-items: center;
        width: 42px;
        border: 0;
        border-radius: 10px;
        background: var(--theme-nav);
        color: #ffffff;
        cursor: pointer;
    }
</style>

<button class="chatbot-launcher" id="chatbotLauncher" type="button" aria-label="Open support assistant">
    <span class="material-symbols-outlined">chat</span>
</button>
<section class="chatbot-panel" id="chatbotPanel" aria-label="MyMoyo support assistant">
    <header class="chatbot-header">
        <div>
            <strong>MyMoyo Assistant</strong>
            <div id="chatbotStatus" style="font-size:0.75rem; opacity:0.8;">Local guide ready</div>
        </div>
        <button id="chatbotClose" type="button" aria-label="Close support assistant">
            <span class="material-symbols-outlined">close</span>
        </button>
    </header>
    <div class="chatbot-messages" id="chatbotMessages">
        <div class="chatbot-message assistant">Hello. How can I help you use the MyMoyo portal?</div>
    </div>
    <form class="chatbot-form js-ajax-form" id="chatbotForm">
        {% csrf_token %}
        <input id="chatbotInput" type="text" maxlength="1000" placeholder="Ask a question..." autocomplete="off" required>
        <button type="submit" aria-label="Send message">
            <span class="material-symbols-outlined">send</span>
        </button>
    </form>
</section>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const launcher = document.getElementById('chatbotLauncher');
        const panel = document.getElementById('chatbotPanel');
        const closeButton = document.getElementById('chatbotClose');
        const form = document.getElementById('chatbotForm');
        const input = document.getElementById('chatbotInput');
        const messages = document.getElementById('chatbotMessages');
        const status = document.getElementById('chatbotStatus');
        const history = [];
        const launcherPositionKey = 'mymoyo-chatbot-launcher-position';
        let launcherDrag = null;
        let suppressNextLauncherClick = false;

        function clamp(value, min, max) {
            return Math.min(Math.max(value, min), max);
        }

        function setLauncherPosition(left, top, shouldSave = true) {
            const launcherRect = launcher.getBoundingClientRect();
            const maxLeft = window.innerWidth - launcherRect.width - 8;
            const maxTop = window.innerHeight - launcherRect.height - 8;
            const nextLeft = clamp(left, 8, maxLeft);
            const nextTop = clamp(top, 8, maxTop);

            launcher.style.left = `${nextLeft}px`;
            launcher.style.top = `${nextTop}px`;
            launcher.style.right = 'auto';
            launcher.style.bottom = 'auto';

            if (shouldSave) {
                localStorage.setItem(launcherPositionKey, JSON.stringify({
                    left: nextLeft,
                    top: nextTop,
                }));
            }
        }

        function positionPanelNearLauncher() {
            const launcherRect = launcher.getBoundingClientRect();
            const panelWidth = Math.min(380, window.innerWidth - 32);
            const panelHeight = panel.offsetHeight || 440;
            const left = clamp(launcherRect.left + launcherRect.width - panelWidth, 16, window.innerWidth - panelWidth - 16);
            const top = clamp(launcherRect.top - panelHeight - 16, 16, window.innerHeight - panelHeight - 16);

            panel.style.left = `${left}px`;
            panel.style.top = `${top}px`;
            panel.style.right = 'auto';
            panel.style.bottom = 'auto';
        }

        function restoreLauncherPosition() {
            try {
                const savedPosition = JSON.parse(localStorage.getItem(launcherPositionKey) || 'null');
                if (savedPosition && Number.isFinite(savedPosition.left) && Number.isFinite(savedPosition.top)) {
                    setLauncherPosition(savedPosition.left, savedPosition.top, false);
                }
            } catch (error) {
                localStorage.removeItem(launcherPositionKey);
            }
        }

        function addMessage(role, content, links = []) {
            const message = document.createElement('div');
            message.className = `chatbot-message ${role}`;

            const messageText = document.createElement('div');
            messageText.textContent = content;
            message.appendChild(messageText);

            if (role === 'assistant' && Array.isArray(links) && links.length) {
                const linkList = document.createElement('div');
                linkList.className = 'chatbot-message-links';

                links.forEach(function (link) {
                    if (!link || !link.url || !link.label) return;

                    const anchor = document.createElement('a');
                    anchor.className = 'chatbot-message-link';
                    anchor.href = link.url;

                    const icon = document.createElement('span');
                    icon.className = 'material-symbols-outlined';
                    icon.setAttribute('aria-hidden', 'true');
                    icon.textContent = 'open_in_new';

                    const label = document.createElement('span');
                    label.textContent = link.label;

                    anchor.append(icon, label);
                    linkList.appendChild(anchor);
                });

                if (linkList.children.length) {
                    message.appendChild(linkList);
                }
            }

            messages.appendChild(message);
            messages.scrollTop = messages.scrollHeight;
        }

        function updateChatbotStatus(mode) {
            if (!status) return;

            status.textContent = mode === 'online' ? 'Online AI support' : 'Offline local guide';
        }

        restoreLauncherPosition();

        launcher.addEventListener('pointerdown', function (event) {
            const rect = launcher.getBoundingClientRect();
            launcherDrag = {
                startX: event.clientX,
                startY: event.clientY,
                offsetX: event.clientX - rect.left,
                offsetY: event.clientY - rect.top,
                moved: false,
            };
            launcher.setPointerCapture(event.pointerId);
            launcher.classList.add('dragging');
        });

        launcher.addEventListener('pointermove', function (event) {
            if (!launcherDrag) return;

            const distance = Math.hypot(event.clientX - launcherDrag.startX, event.clientY - launcherDrag.startY);
            if (distance > 4) {
                launcherDrag.moved = true;
            }

            setLauncherPosition(event.clientX - launcherDrag.offsetX, event.clientY - launcherDrag.offsetY);
            if (panel.classList.contains('open')) {
                positionPanelNearLauncher();
            }
        });

        launcher.addEventListener('pointerup', function (event) {
            if (!launcherDrag) return;

            suppressNextLauncherClick = launcherDrag.moved;
            launcher.releasePointerCapture(event.pointerId);
            launcher.classList.remove('dragging');
            window.setTimeout(function () {
                launcherDrag = null;
                suppressNextLauncherClick = false;
            }, 0);
        });

        launcher.addEventListener('click', function () {
            if (suppressNextLauncherClick) return;

            panel.classList.toggle('open');
            if (panel.classList.contains('open')) {
                positionPanelNearLauncher();
                input.focus();
            }
        });

        closeButton.addEventListener('click', function () {
            panel.classList.remove('open');
        });

        window.addEventListener('resize', function () {
            const rect = launcher.getBoundingClientRect();
            setLauncherPosition(rect.left, rect.top);
            if (panel.classList.contains('open')) {
                positionPanelNearLauncher();
            }
        });

        form.addEventListener('submit', async function (event) {
            event.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';
            input.disabled = true;
            addMessage('assistant', 'Processing...');
            const pendingMessage = messages.lastElementChild;

            try {
                const response = await fetch('{% url "chatbot_message" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': form.querySelector('[name="csrfmiddlewaretoken"]').value,
                    },
                    body: JSON.stringify({message: text, history}),
                });
                const data = await response.json();
                pendingMessage.remove();

                if (!response.ok) {
                    addMessage('assistant', data.error || 'The assistant is unavailable right now.');
                    return;
                }

                updateChatbotStatus(data.mode);
                addMessage('assistant', data.reply, data.links);
                history.push({role: 'user', content: text});
                history.push({role: 'assistant', content: data.reply});
            } catch (error) {
                pendingMessage.remove();
                addMessage('assistant', 'The assistant is unavailable right now. Please try again shortly.');
            } finally {
                input.disabled = false;
                input.focus();
            }
        });
    });
</script>
