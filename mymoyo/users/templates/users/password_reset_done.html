<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Link Sent - MyMoyo</title>
    <link href="{% static 'vendor/fonts/inter/inter.css' %}" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            background: #eceff1;
            color: #102027;
            font-family: 'Inter', sans-serif;
        }
        .auth-card {
            width: min(100%, 440px);
            padding: 2rem;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 24px 48px rgba(16, 32, 48, 0.12);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            margin-bottom: 2rem;
        }
        .brand-icon {
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            border-radius: 18px;
            background: #ffca28;
            font-size: 1.5rem;
            font-weight: 700;
        }
        h1 { margin: 0; font-size: 1.65rem; }
        p { color: #607d8b; line-height: 1.6; }
        a {
            color: #00897b;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="auth-card">
        <div class="brand">
            <div class="brand-icon">+</div>
            <div>
                <strong>MyMoyo</strong>
                <div style="color:#607d8b; font-size:0.8rem;">PORTAL</div>
            </div>
        </div>
        <h1>Check your email</h1>
        <p>If an account exists with that email address, a password reset link has been sent.</p>
        <p><a href="{% url 'login' %}">Back to sign in</a></p>
    </main>
</body>
</html>
