<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MyMoyo Vue App</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f6fbf8;
            color: #123c35;
        }
        main {
            width: min(32rem, calc(100vw - 2rem));
            padding: 2rem;
            border: 1px solid #d9e8e2;
            border-radius: 8px;
            background: #ffffff;
        }
        code {
            display: inline-block;
            padding: 0.2rem 0.35rem;
            border-radius: 4px;
            background: #e7f7f0;
        }
    </style>
</head>
<body>
    <main>
        <h1>Vue frontend is ready to build</h1>
        <p>Run <code>npm install</code> and <code>npm run build</code> inside <code>mymoyo/frontend</code>, then reload this page.</p>
    </main>
</body>
</html>
