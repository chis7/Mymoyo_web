services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mymoyo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ***REMOVED_POSTGRES_PASSWORD***
    ports:
      - "55461:5432"
    volumes:
      - mymoyo-db-data:/var/lib/postgresql/data
    networks:
      - mymoyo-network

  web:
    build: .
    command: [
      "sh", "-c", 
      "python manage.py collectstatic --noinput && gunicorn --bind 0.0.0.0:8000 mymoyo.wsgi"
    ]
    # Removed external ports here. Gunicorn is now protected behind Nginx.
    env_file:
      - .env 
    environment:
      HAPI_FHIR_BASE_URL: http://hapi-fhir:8080/fhir
      HAPI_FHIR_SYNC_ENABLED: "true"
    depends_on:
      - db
      - osrm-zambia
      - hapi-fhir
    volumes:
      - static_volume:/app/staticfiles
    networks:
      - mymoyo-network

  hapi-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hapi
      POSTGRES_USER: hapi
      POSTGRES_PASSWORD: ${HAPI_POSTGRES_PASSWORD}
    volumes:
      - hapi-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hapi -d hapi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mymoyo-network

  hapi-fhir:
    image: hapiproject/hapi:latest
    ports:
      - "7201:8080"
    volumes:
      - ./hapi/application.yaml:/app/config/application.yaml:ro
    depends_on:
      hapi-db:
        condition: service_healthy
    networks:
      - mymoyo-network

  osrm-zambia:
    image: osrm/osrm-backend:latest
    command: ["osrm-routed", "--algorithm", "mld", "/data/zambia-latest.osrm"]
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    networks:
      - mymoyo-network

  nginx:
    image: nginx:alpine
    ports:
      - "7000:443"  # Maps your local machine's port 7000 to HTTPS port 443
      - "80:80"    # Handles HTTP traffic to redirect it
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web
    networks:
      - mymoyo-network

networks:
  mymoyo-network:
    driver: bridge

volumes:
  mymoyo-db-data:
  hapi-db-data:
  static_volume:
